name: Apply Codex SIFUP UI patch

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/codex-apply-sifup-ui-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch UI labels, player score hints, and player code editor
        run: |
          node <<'NODE'
          const fs = require('fs');

          function patchFile(file, patches) {
            let source = fs.readFileSync(file, 'utf8');
            for (const [search, replacement] of patches) {
              if (!source.includes(search)) {
                throw new Error(`Missing pattern in ${file}: ${search.slice(0, 120)}`);
              }
              source = source.replace(search, replacement);
            }
            fs.writeFileSync(file, source, 'utf8');
          }

          patchFile('src/components/admin/SifupWorkspace.tsx', [
            [
`function whatsappHref(phone: string) {
  const normalized = normalizePhone(phone);
  if (!normalized) return "";
  const withCountry = normalized.startsWith("56") ? normalized : ` + '`56${normalized}`' + `;
  return ` + '`https://wa.me/${withCountry}`' + `;
}

function PageTitle`,
`function whatsappHref(phone: string) {
  const normalized = normalizePhone(phone);
  if (!normalized) return "";
  const withCountry = normalized.startsWith("56") ? normalized : ` + '`56${normalized}`' + `;
  return ` + '`https://wa.me/${withCountry}`' + `;
}

function teamLabel(team: Team) {
  if (team === "A") return "Rojo";
  if (team === "B") return "Amarillo";
  return "Sin equipo";
}

function playerCode(player: Player) {
  const source = player.nickname || player.name;
  return source.trim().slice(0, 2).toUpperCase();
}

function playerScore(data: SifupData, player: Player) {
  const appearances = data.matchPlayers.filter((row) => (row.name === player.name || row.playerId === player.id) && row.attendanceStatus === "confirmed");
  let wins = 0;
  let losses = 0;
  let draws = 0;
  appearances.forEach((row) => {
    const result = data.results.find((item) => item.matchId === row.matchId);
    if (!result || row.team === "none") return;
    if (result.winner === "draw") draws += 1;
    else if (result.winner === row.team) wins += 1;
    else losses += 1;
  });
  return { played: appearances.length, wins, losses, draws, points: wins * 3 + draws };
}

function PageTitle`
            ],
            [`function teamDot(team: Team) {
  if (team === "A") return "bg-(--green)";
  if (team === "B") return "bg-(--gold)";
  return "bg-white/30";
}`, `function teamDot(team: Team) {
  if (team === "A") return "bg-(--red)";
  if (team === "B") return "bg-(--gold)";
  return "bg-white/30";
}`],
            [`    { team: "A", label: "Verde", selected: "bg-(--green) text-(--bg-deep) border-(--green)", idle: "border-(--green)/35 text-(--green) bg-(--green)/10 hover:bg-(--green)/20" },`, `    { team: "A", label: "Rojo", selected: "bg-(--red) text-white border-(--red)", idle: "border-(--red)/35 text-(--red) bg-(--red)/10 hover:bg-(--red)/20" },`],
            [`function Input({ label, value, onChange, type = "text" }: { label: string; value: string; onChange: (value: string) => void; type?: string }) {`, `function Input({ label, value, onChange, type = "text", maxLength }: { label: string; value: string; onChange: (value: string) => void; type?: string; maxLength?: number }) {`],
            [`        value={value}
        onChange={(event) => onChange(event.target.value)}
        className=`, `        value={value}
        maxLength={maxLength}
        onChange={(event) => onChange(event.target.value)}
        className=`],
            [`<option value="none">none</option><option value="A">A</option><option value="B">B</option>`, `<option value="none">Sin equipo</option><option value="A">Rojo</option><option value="B">Amarillo</option>`],
            [`<option value="none">none</option><option value="A">A</option><option value="B">B</option>`, `<option value="none">Sin equipo</option><option value="A">Rojo</option><option value="B">Amarillo</option>`],
            [`row.team === "none" ? "Sin equipo" : row.team === "A" ? "Equipo verde" : "Equipo amarillo"`, `teamLabel(row.team)`],
            [`        <div className="space-y-2 rounded-md border-2 border-(--green)/35 bg-(--green)/10 p-3">
          <p className="text-sm font-bold text-(--green)">Equipo Verde ({teamA.length})</p>`, `        <div className="space-y-2 rounded-md border-2 border-(--red)/35 bg-(--red)/10 p-3">
          <p className="text-sm font-bold text-(--red)">Equipo Rojo ({teamA.length})</p>`],
            [`  candidates,
  onClose,`, `  data,
  candidates,
  onClose,`],
            [`  candidates: Player[];
  onClose: () => void;`, `  data: SifupData;
  candidates: Player[];
  onClose: () => void;`],
            [`            {candidates.map((player) => (
              <button
                key={player.id}
                type="button"
                onClick={() => onAddExisting(player)}
                className="flex w-full items-center justify-between rounded-md border border-(--border) px-3 py-2 text-left text-sm hover:bg-white/[0.04]"
              >
                <span className="font-medium text-white">{player.name}</span>
                <Plus size={16} className="text-(--muted)" />
              </button>
            ))}`, `            {candidates.map((player) => {
              const score = playerScore(data, player);
              return (
                <button
                  key={player.id}
                  type="button"
                  onClick={() => onAddExisting(player)}
                  className="flex w-full items-center justify-between gap-3 rounded-md border border-(--border) px-3 py-2 text-left text-sm hover:bg-white/[0.04]"
                >
                  <span className="min-w-0">
                    <span className="font-medium text-white">{player.name}</span>
                    <span className="mt-0.5 block text-xs text-(--muted)">{playerCode(player)} - {score.played} PJ - {score.points} pts</span>
                  </span>
                  <Plus size={16} className="shrink-0 text-(--muted)" />
                </button>
              );
            })}`],
            [`<div className="grid grid-cols-2 gap-3"><Input label="Team A" type="number" value={String(scoreA)} onChange={(value) => setScoreA(Number(value))} /><Input label="Team B" type="number" value={String(scoreB)} onChange={(value) => setScoreB(Number(value))} /></div>`, `<div className="grid grid-cols-2 gap-3"><Input label="Rojo" type="number" value={String(scoreA)} onChange={(value) => setScoreA(Number(value))} /><Input label="Amarillo" type="number" value={String(scoreB)} onChange={(value) => setScoreB(Number(value))} /></div>`],
            [`<Card><h2 className="font-semibold">Resultado final</h2><p className="mt-2 text-2xl font-semibold">A {result.scoreA} - {result.scoreB} B</p><p className="mt-1 text-sm text-(--muted)">{result.winner === "draw" ? "Empate" : ` + '`Gana equipo ${result.winner}`' + `}</p></Card>`, `<Card><h2 className="font-semibold">Resultado final</h2><p className="mt-2 text-2xl font-semibold">Rojo {result.scoreA} - {result.scoreB} Amarillo</p><p className="mt-1 text-sm text-(--muted)">{result.winner === "draw" ? "Empate" : ` + '`Gana ${teamLabel(result.winner)}`' + `}</p></Card>`],
            [`        <AddPlayerModal
          candidates={data.players.filter((player) => player.active && !rows.some((row) => row.playerId === player.id))}`, `        <AddPlayerModal
          data={data}
          candidates={data.players.filter((player) => player.active && !rows.some((row) => row.playerId === player.id))}`],
            [`              <PlayerRow key={player.id} player={player} isAdmin={isAdmin} onEdit={() => setEditingPlayer(player)}>
                <PaymentBadge status={paid ? "paid" : payment?.paymentStatus ?? "unpaid"} />`, `              <PlayerRow key={player.id} player={player} isAdmin={isAdmin} onEdit={() => setEditingPlayer(player)}>
                <span className="rounded-md bg-white/[0.08] px-2 py-1 text-xs font-black text-white ring-1 ring-(--border)">{playerCode(player)}</span>
                <PaymentBadge status={paid ? "paid" : payment?.paymentStatus ?? "unpaid"} />`],
            [`              <PlayerRow key={player.id} player={player} isAdmin={isAdmin} onEdit={() => setEditingPlayer(player)}>
                <span className="rounded-full bg-white/[0.08] px-2 py-1 text-xs font-semibold text-(--muted) ring-1 ring-(--border)">{formatCurrency(debt)}</span>`, `              <PlayerRow key={player.id} player={player} isAdmin={isAdmin} onEdit={() => setEditingPlayer(player)}>
                <span className="rounded-md bg-white/[0.08] px-2 py-1 text-xs font-black text-white ring-1 ring-(--border)">{playerCode(player)}</span>
                <span className="rounded-full bg-white/[0.08] px-2 py-1 text-xs font-semibold text-(--muted) ring-1 ring-(--border)">{formatCurrency(debt)}</span>`],
            [`      <Input label="Pseudonimo" value={draft.nickname} onChange={(value) => setDraft({ ...draft, nickname: value })} />`, `      <Input label="Definicion (2 letras)" value={playerCode(draft)} maxLength={2} onChange={(value) => setDraft({ ...draft, nickname: value.toUpperCase().slice(0, 2) })} />`],
            [`        <TeamColumn label="Equipo A" rows={teamA} />
        <TeamColumn label="Equipo B" rows={teamB} />`, `        <TeamColumn label="Equipo Rojo" rows={teamA} />
        <TeamColumn label="Equipo Amarillo" rows={teamB} />`],
            [`<b>A</b> {result.scoreA} - {result.scoreB} <b>B</b>
                  <small>{result.winner === "draw" ? "Empate" : ` + '`Gana ${result.winner}`' + `}</small>`, `<b>Rojo</b> {result.scoreA} - {result.scoreB} <b>Amarillo</b>
                  <small>{result.winner === "draw" ? "Empate" : ` + '`Gana ${teamLabel(result.winner)}`' + `}</small>`],
            [`<span>{row.player.slice(0, 2).toUpperCase()}</span>`, `<span>{row.nickname?.slice(0, 2).toUpperCase() || row.player.slice(0, 2).toUpperCase()}</span>`]
          ]);

          patchFile('src/lib/whatsapp.ts', [
            ['Equipo A:', 'Equipo Rojo:'],
            ['Equipo B:', 'Equipo Amarillo:'],
            ['const winner = result.winner === "draw" ? "Empate" : `Gana equipo ${result.winner}`;', 'const winner = result.winner === "draw" ? "Empate" : `Gana ${result.winner === "A" ? "Rojo" : "Amarillo"}`;'],
            ['Equipo A ${result.scoreA} - ${result.scoreB} Equipo B', 'Rojo ${result.scoreA} - ${result.scoreB} Amarillo']
          ]);

          fs.unlinkSync('.github/workflows/codex-apply-sifup-ui-patch.yml');
          NODE
      - name: Commit patch
        run: |
          git config user.name "m9granado"
          git config user.email "mgranado@gmail.com"
          git add src/components/admin/SifupWorkspace.tsx src/lib/whatsapp.ts .github/workflows/codex-apply-sifup-ui-patch.yml
          git commit -m "Update teams and player selection UI"
          git push

